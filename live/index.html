<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-Apps Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <!-- <script src="realtime-fetcher.js" defer></script> -->
    <script src="historical-fetcher.js" defer></script>
    <script src="ui-manager.js" defer></script>
    <script src="utils.js" defer></script>
</head>
<body>
    <header class="navbar">
        <h1 class="brand" style="cursor: pointer;" tabindex="0" onclick="window.location.href = '../';" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href = '../';}">W-Apps</h1>

        <nav class="tabs base-card">
            <button class="tab active">3 Hours</button>
            <button class="tab">Day</button>
            <button class="tab">Week</button>
            <button class="tab">Month</button>
        </nav>

        <div class="actions">
            <button class="button outline">Archives</button>
            <button class="button primary">About</button>
            <button class="button outline" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </div>
    </header>

    <main>
        <section class="controls">
            <nav class="tabs base-card"></nav>

            <div class="search base-card">
                <input type="search" placeholder="Search locations..." autofocus />
            </div>
        </section>

        <section class="metrics">
            <div class="metrics-header">
                <h2>Current Weather</h2>
            </div>
            <div class="spotlight-container">
                <!-- Metrics will be dynamically injected -->
            </div>
        </section>

        <div class="visualizations spotlight-container">
            <section class="base-card card visualization spotlight-item chart">
                <div class="spotlight-border"></div>
                <div class="spotlight-content">
                    <h2 id="chart-title">Graph</h2>
                    <div class="content">
                        <canvas id="windChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="base-card card visualization spotlight-item table">
                <div class="spotlight-border"></div>
                <div class="spotlight-content">
                    <h2>Raw Data</h2>
                    <div class="content scrollable">
                        <table>
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const METRIC_ID_TO_KEY = {
            'wind-avg': 'windAvg',
            'wind-gusts': 'windGusts',
            'wind-direction': 'windDirection',
            'temperature': 'temperature',
            'dew-point': 'dewPoint',
            'humidity': 'humidity',
            'pressure': 'pressure',
            'pressure-qff': 'pressureQff',
            'pressure-qnh': 'pressureQnh',
            'precipitation': 'precipitation',
            'sunshine': 'sunshine',
            'global-radiation': 'globalRadiation'
        };

        const METRIC_GROUP_DISPLAY_NAMES = {
            wind: 'Wind',
            pressure: 'Pressure',
            temperature: 'Temperature',
            dewpoint: 'Dew Point',
            humidity: 'Humidity',
            precipitation: 'Precipitation',
            sunshine: 'Sunshine',
            radiation: 'Radiation'
        };

        const metricEls = {
            windChart: document.getElementById('windChart'),
            chartTitle: document.getElementById('chart-title'),
            currentTemp: document.getElementById('current-temp'),
            trendTemp: document.getElementById('trend-temp'),
            currentHumidity: document.getElementById('current-humidity'),
            currentWindGust: document.getElementById('current-wind-gust'),
            currentPressure: document.getElementById('current-pressure'),
            currentWindAvg: document.getElementById('current-wind-avg'),
            currentWindDirection: document.getElementById('current-wind-direction'),
            windArrow: document.getElementById('wind-arrow'),
            currentPressureQff: document.getElementById('current-pressure-qff'),
            currentPressureQnh: document.getElementById('current-pressure-qnh'),
            currentPrecipitation: document.getElementById('current-precipitation'),
            currentSunshine: document.getElementById('current-sunshine'),
            currentGlobalRadiation: document.getElementById('current-global-radiation'),
            currentDewPoint: document.getElementById('current-dew-point')
        };

        let stations = [];
        let favorites = new Set();
        let hiddenMetrics = new Set(['pressure', 'pressure-qff', 'pressure-qnh', 'global-radiation', 'dew-point']);
        let currentMetricGroup = localStorage.getItem('currentMetricGroup') || 'wind';
        let currentStation = null;
        let currentTimeframe = localStorage.getItem('lastSelectedTimeframe') || 'Last Day';

        function handleMetricCardClick(metricId) {
            const metricKey = METRIC_ID_TO_KEY[metricId];
            if (!metricKey) return;

            const group = WindDashboard.METRIC_TO_GROUP[metricKey];
            if (!group) return;

            if (currentMetricGroup === group) return;

            currentMetricGroup = group;
            localStorage.setItem('currentMetricGroup', currentMetricGroup);

            document.querySelectorAll('.metric').forEach(card => {
                card.classList.remove('active');
            });

            Object.keys(METRIC_ID_TO_KEY).forEach(id => {
                const key = METRIC_ID_TO_KEY[id];
                if (WindDashboard.METRIC_TO_GROUP[key] === group) {
                    const card = document.querySelector(`.metric[data-metric-id="${id}"]`);
                    if (card) card.classList.add('active');
                }
            });

            updateVisualizations();
        }

        function restoreActiveMetricCard() {
            document.querySelectorAll('.metric').forEach(card => {
                card.classList.remove('active');
            });

            Object.keys(METRIC_ID_TO_KEY).forEach(id => {
                const key = METRIC_ID_TO_KEY[id];
                if (WindDashboard.METRIC_TO_GROUP[key] === currentMetricGroup) {
                    const card = document.querySelector(`.metric[data-metric-id="${id}"]`);
                    if (card) card.classList.add('active');
                }
            });
        }

        function isFavorited(station) {
            return favorites.has(station);
        }

        function toggleFavorite(station) {
            if (favorites.has(station)) {
                favorites.delete(station);
            } else {
                favorites.add(station);
            }
            localStorage.setItem('favoriteStations', JSON.stringify([...favorites]));
        }

        function updateActiveTab(tabGroup) {
            tabGroup.querySelectorAll('.tab').forEach(tab => {
                let star = tab.querySelector('.star');
                if (!star) {
                    star = document.createElement('span');
                    star.className = 'star';
                    star.tabIndex = 0;
                    star.onclick = (e) => {
                        e.stopPropagation();
                        toggleFavorite(tab.dataset.station);
                        updateStar(tab);
                    };
                    star.onkeydown = (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.stopPropagation();
                            e.preventDefault();
                            toggleFavorite(tab.dataset.station);
                            updateStar(tab);
                        }
                    };
                    tab.appendChild(star);
                }
                updateStar(tab);
            });
        }

        function updateStar(tab) {
            const star = tab.querySelector('.star');
            const active = tab.classList.contains('active');
            const fav = isFavorited(tab.dataset.station);

            star.classList.toggle('is-active', active);

            if (active) {
                star.textContent = fav ? '★' : '☆';
                star.style.color = fav ? 'gold' : '';
            }
        }

        async function loadStations() {
            try {
                const response = await fetch('../assets/coord_station_meteosuisse.json');
                const data = await response.json();
                stations = data.filter(([code, lat, lon, name]) => name !== null).map(([code, lat, lon, name, canton, index]) => ({
                    code, lat, lon, name: name.replace(' / ', '/'), canton, index
                }));
            } catch (error) {
                console.error('Error loading stations:', error);
                toast('Unable to connect. Please check your internet.');
            }
        }

        const SearchEngine = {
            getNearest(lat, lon, stations) {
                const P = Math.PI / 180;
                return stations.map(s => {
                    const a = 0.5 - Math.cos((s.lat - lat) * P) / 2 + Math.cos(lat * P) * Math.cos(s.lat * P) * (1 - Math.cos((s.lon - lon) * P)) / 2;
                    return { ...s, isNearby: true, dist: 12742 * Math.asin(Math.sqrt(a)) };
                }).filter(s => !isNaN(s.dist)).sort((a, b) => a.dist - b.dist).slice(0, 3);
            },

            levenshtein(a, b) {
                const matrix = [];
                for (let i = 0; i <= b.length; i++) matrix[i] = [i];
                for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

                for (let i = 1; i <= b.length; i++) {
                    for (let j = 1; j <= a.length; j++) {
                        if (b.charAt(i - 1) === a.charAt(j - 1)) {
                            matrix[i][j] = matrix[i - 1][j - 1];
                        } else {
                            matrix[i][j] = Math.min(
                                matrix[i - 1][j - 1] + 1,
                                matrix[i][j - 1] + 1,
                                matrix[i - 1][j] + 1
                            );
                        }
                    }
                }
                return matrix[b.length][a.length];
            },

            isFuzzyMatch(query, name, maxEdits) {
                const q = query.toLowerCase();
                const n = name.toLowerCase();

                const distance = this.levenshtein(q, n.substring(0, q.length + 1));
                if (distance <= maxEdits) return true;

                const words = n.split(/[\s/-]+/);
                return words.some(word => {
                    const wordPart = word.substring(0, q.length + 1);
                    return this.levenshtein(q, wordPart) <= maxEdits;
                });
            },

            getMatches(query, stations) {
                const q = query.toLowerCase().trim();
                if (q.length < 1) return [];

                const exactCode = stations.filter(s => s.code && s.code.toLowerCase() === q);

                const startsWith = stations.filter(s => 
                    (s.name.toLowerCase().startsWith(q) || (s.code && s.code.toLowerCase().startsWith(q))) &&
                    !exactCode.some(m => m.name === s.name)
                );

                const contains = stations.filter(s =>
                    (s.name.toLowerCase().includes(q) || (s.code && s.code.toLowerCase().includes(q))) && 
                    !exactCode.some(m => m.name === s.name) &&
                    !startsWith.some(m => m.name === s.name)
                );

                let fuzzy1 = [];
                if (q.length >= 3) {
                    fuzzy1 = stations.filter(s => {
                        const alreadyMatched = [...exactCode, ...startsWith, ...contains].some(m => m.name === s.name);
                        return !alreadyMatched && this.isFuzzyMatch(q, s.name, 1);
                    });
                }

                let fuzzy2 = [];
                if (q.length >= 5) {
                    fuzzy2 = stations.filter(s => {
                        const alreadyMatched = [...exactCode, ...startsWith, ...contains, ...fuzzy1].some(m => m.name === s.name);
                        return !alreadyMatched && this.isFuzzyMatch(q, s.name, 2);
                    });
                }

                return [...exactCode, ...startsWith, ...contains, ...fuzzy1, ...fuzzy2];
            }
        };

        function updateEmptyState() {
            const emptyState = document.querySelector('.empty-state');
            if (!emptyState) return;
            const totalMetrics = 12;
            if (hiddenMetrics.size === totalMetrics) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
            }
        }

        function restoreMetric(metricId) {
            hiddenMetrics.delete(metricId);
            localStorage.setItem('hiddenMetrics', JSON.stringify([...hiddenMetrics]));

            const metricCard = document.querySelector(`.metric[data-metric-id="${metricId}"]`);
            if (metricCard) {
                metricCard.classList.remove('hidden-metric');
                MetricCardDragManager.container.appendChild(metricCard);
            }
            updateEmptyState();
            MetricCardDragManager.saveOrder();
        }

        function showUnifiedMenu(e, targetMetricId = null) {
            const existingMenu = document.querySelector('.context-menu');
            if (existingMenu) existingMenu.remove();

            const menu = document.createElement('div');
            menu.className = 'context-menu base-card';
            menu.style.position = 'fixed';

            const addItem = document.createElement('div');
            addItem.className = 'context-menu-item success';

            const metricNames = {
                'wind-avg': 'Average Wind',
                'wind-gusts': 'Max Wind Gusts',
                'temperature': 'Temperature',
                'humidity': 'Humidity',
                'pressure': 'Air Pressure - QFE',
                'wind-direction': 'Wind Direction',
                'pressure-qff': 'Air Pressure - QFF',
                'pressure-qnh': 'Air Pressure - QNH',
                'precipitation': 'Precipitation',
                'sunshine': 'Sunshine',
                'global-radiation': 'Global Radiation',
                'dew-point': 'Dew Point'
            };

            if (hiddenMetrics.size > 0) {
                addItem.innerHTML = `<span class="icon">➕</span> Add Metric <span style="margin-left:auto;font-size:10px">▶</span>`;

                const submenu = document.createElement('div');
                submenu.className = 'context-menu-submenu base-card';

                hiddenMetrics.forEach(metricId => {
                    const subItem = document.createElement('div');
                    subItem.className = 'context-menu-item';
                    subItem.innerHTML = `${metricNames[metricId] || metricId}`;
                    subItem.onclick = (event) => {
                        event.stopPropagation();
                        restoreMetric(metricId);
                        const menu = document.querySelector('.context-menu');
                        if (menu) menu.remove();
                    };
                    submenu.appendChild(subItem);
                });

                addItem.appendChild(submenu);
            } else {
                addItem.innerHTML = `<span class="icon">➕</span> Add Metric`;
                addItem.classList.add('disabled');
            }
            menu.appendChild(addItem);

            const separator = document.createElement('div');
            separator.className = 'context-menu-separator';
            menu.appendChild(separator);

            const deleteItem = document.createElement('div');
            deleteItem.className = 'context-menu-item danger';

            if (targetMetricId) {
                deleteItem.innerHTML = `<span class="icon">❌</span> Delete Metric`;
                deleteItem.onclick = (event) => {
                    event.stopPropagation();
                    deleteMetric(targetMetricId);
                    menu.remove();
                };
            } else {
                deleteItem.innerHTML = `<span class="icon">❌</span> Delete Metric`;
                deleteItem.classList.add('disabled');
            }
            menu.appendChild(deleteItem);

            document.body.appendChild(menu);

            let x = e.clientX;
            let y = e.clientY;
            const menuWidth = 180;
            if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
            const menuHeight = menu.offsetHeight || 100;
            if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;

            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;

            const closeMenu = (event) => {
                if (!menu.contains(event.target)) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                    window.removeEventListener('resize', closeMenu);
                    window.removeEventListener('scroll', closeMenu, true);
                    document.removeEventListener('contextmenu', closeMenu);
                }
            };

            requestAnimationFrame(() => {
                document.addEventListener('click', closeMenu);
                window.addEventListener('resize', closeMenu);
                window.addEventListener('scroll', closeMenu, true);
                document.addEventListener('contextmenu', closeMenu);
            });
        }

        function deleteMetric(metricId) {
            hiddenMetrics.add(metricId);
            localStorage.setItem('hiddenMetrics', JSON.stringify([...hiddenMetrics]));

            const metricCard = document.querySelector(`.metric[data-metric-id="${metricId}"]`);
            if (metricCard) metricCard.classList.add('hidden-metric');
            updateEmptyState();
            MetricCardDragManager.saveOrder();
        }

        function setupMetricContextMenus() {
            const metricsSection = document.querySelector('.metrics');
            if (metricsSection) {
                metricsSection.addEventListener('contextmenu', (e) => {
                    e.preventDefault();

                    const card = e.target.closest('.metric[data-metric-id]');

                    if (card) {
                        showUnifiedMenu(e, card.dataset.metricId);
                    } else {
                        showUnifiedMenu(e, null);
                    }
                });
            }
        }

        function deleteStation(station) {
            if (favorites.has(station.name)) {
                favorites.delete(station.name);
                localStorage.setItem('favoriteStations', JSON.stringify([...favorites]));
            }

            const tab = document.querySelector(`.controls .tabs .tab[data-station="${station.name}"]`);
            if (tab) {
                const wasActive = tab.classList.contains('active');
                tab.remove();

                if (wasActive) {
                    const remainingTabs = document.querySelectorAll('.controls .tabs .tab');
                    if (remainingTabs.length > 0) {
                        remainingTabs[0].click();
                    } else {
                        localStorage.removeItem('lastSelectedStation');
                        localStorage.removeItem('lastSelectedStationCode');
                        currentStation = null;
                        WindDashboard.createEmptyChart(metricEls.windChart.getContext('2d'), currentMetricGroup);
                        WindDashboard.populateTable(document.querySelector('table'), { labels: [], datasets: [] }, currentMetricGroup);
                        metricEls.currentTemp.textContent = '--°C';
                        metricEls.trendTemp.textContent = '--°C over last hour';
                        metricEls.currentHumidity.textContent = '--%';
                        metricEls.currentWindGust.textContent = '-- kph';
                        metricEls.currentPressure.textContent = '-- hPa';
                        metricEls.currentWindAvg.textContent = '-- kph';
                        metricEls.currentWindDirection.textContent = '--°';
                        metricEls.currentPressureQff.textContent = '-- hPa';
                        metricEls.currentPressureQnh.textContent = '-- hPa';
                        metricEls.currentPrecipitation.textContent = '-- mm';
                        metricEls.currentSunshine.textContent = '-- min';
                        metricEls.currentGlobalRadiation.textContent = '-- W/m²';
                        metricEls.currentDewPoint.textContent = '--°C';
                    }
                }
            }
        }

        const TabManager = {
            container: document.querySelector('.controls .tabs'),

            addTab(station) {
                const existingTab = this.container.querySelector(`.tab[data-station="${station.name}"]`);
                this.deactivateAll();

                if (existingTab) {
                    existingTab.classList.add('active');
                } else {
                    const newTab = this.createTabElement(station);
                    this.container.appendChild(newTab);
                }

                currentStation = station;

                if (typeof window.updateActiveTab === 'function') window.updateActiveTab(this.container);
                localStorage.setItem('lastSelectedStation', station.name);
                localStorage.setItem('lastSelectedStationCode', station.code);
                console.log('Selected tab:', station.name);

                updateVisualizations();
            },

            createTabElement(station) {
                const btn = document.createElement('button');
                btn.className = 'tab active';
                btn.textContent = station.name;
                btn.dataset.station = station.name;
                btn.draggable = true;

                btn.addEventListener('dragstart', (e) => {
                    btn.classList.add('dragging');
                    btn.click();
                });

                btn.addEventListener('dragend', () => {
                    btn.classList.remove('dragging');
                    if (typeof updateFavoritesOrder === 'function') updateFavoritesOrder();
                });

                btn.onclick = () => {
                    this.deactivateAll();
                    btn.classList.add('active');
                    if (typeof window.updateActiveTab === 'function') window.updateActiveTab(this.container);

                    currentStation = station;
                    localStorage.setItem('lastSelectedStation', station.name);
                    localStorage.setItem('lastSelectedStationCode', station.code);
                    console.log('Selected tab:', station.name);

                    updateVisualizations();
                };

                btn.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showStationContextMenu(e, station);
                });
                return btn;
            },

            deactivateAll() {
                this.container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            }
        };

        const MetricCardDragManager = {
            container: document.querySelector('.metrics .spotlight-container'),

            init() {
                this.container.querySelectorAll('.metric').forEach(card => {
                    card.addEventListener('dragstart', (e) => {
                        card.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    card.addEventListener('dragend', () => {
                        card.classList.remove('dragging');
                    });
                });

                this.container.addEventListener('dragover', this.handleDragOver.bind(this));
                this.container.addEventListener('drop', this.handleDrop.bind(this));
            },

            handleDragOver(e) {
                e.preventDefault();
                const dragging = this.container.querySelector('.metric.dragging');
                if (!dragging) return;

                const afterElement = this.getDragAfterElement(e.clientX, e.clientY);

                if (afterElement == null) {
                    this.container.appendChild(dragging);
                } else {
                    this.container.insertBefore(dragging, afterElement);
                }
            },

            handleDrop(e) {
                e.preventDefault();
                this.saveOrder();
            },

            getDragAfterElement(x, y) {
                const draggableElements = [
                    ...this.container.querySelectorAll('.metric:not(.dragging):not(.hidden-metric)')
                ];

                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = x - box.left - box.width / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset, element: child };
                    }
                    return closest;
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            },

            saveOrder() {
                const order = [];
                this.container.querySelectorAll('.metric:not(.hidden-metric)').forEach(card => {
                    order.push(card.dataset.metricId);
                });
                localStorage.setItem('metricCardsOrder', JSON.stringify(order));
            },

            restoreOrder() {
                const savedOrder = localStorage.getItem('metricCardsOrder');
                if (!savedOrder) return;

                const order = JSON.parse(savedOrder);
                order.forEach(metricId => {
                    const card = this.container.querySelector(`.metric[data-metric-id="${metricId}"]`);
                    if (card && !card.classList.contains('hidden-metric')) {
                        this.container.appendChild(card);
                    }
                });
            }
        };

        function showStationContextMenu(e, station) {
            const menu = document.createElement('div');
            menu.className = 'context-menu base-card';
            menu.style.position = 'fixed';

            const deleteItem = document.createElement('div');
            deleteItem.className = 'context-menu-item danger';
            deleteItem.innerHTML = `<span class="icon">❌</span> Delete Station`;

            deleteItem.onclick = (event) => {
                event.stopPropagation();
                deleteStation(station);
                menu.remove();
            };

            menu.appendChild(deleteItem);
            document.body.appendChild(menu);

            let x = e.clientX;
            let y = e.clientY;
            if (x + 180 > window.innerWidth) x = window.innerWidth - 180 - 10;
            if (y + 50 > window.innerHeight) y = window.innerHeight - 50 - 10;
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;

            const closeMenu = (event) => {
                if (!menu.contains(event.target)) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                    window.removeEventListener('resize', closeMenu);
                    window.removeEventListener('scroll', closeMenu, true);
                    document.removeEventListener('contextmenu', closeMenu);
                }
            };
            requestAnimationFrame(() => {
                document.addEventListener('click', closeMenu);
                window.addEventListener('resize', closeMenu);
                window.addEventListener('scroll', closeMenu, true);
                document.addEventListener('contextmenu', closeMenu);
            });
        }

        function setupSearch() {
            const input = document.querySelector('.search input');
            const container = document.querySelector('.search');
            const dropdown = document.createElement('ul');
            dropdown.className = 'search-dropdown';
            dropdown.style.display = 'none';
            container.appendChild(dropdown);

            let currentMatches = [];

            let apiPending = false;

            const renderDropdown = (matches) => {
                dropdown.innerHTML = '';
                const query = input.value.trim();
                if (matches.length === 0 && query.length > 0) {
                    if (apiPending) {
                        const li = document.createElement('li');
                        li.className = 'search-dropdown-item';
                        li.style.opacity = '0.5';
                        li.textContent = 'Searching...';
                        li.style.pointerEvents = 'none';
                        dropdown.appendChild(li);
                        dropdown.style.display = 'block';
                    } else {
                        const li = document.createElement('li');
                        li.className = 'search-dropdown-item';
                        li.style.opacity = '0.5';
                        li.textContent = 'No results found';
                        li.style.pointerEvents = 'none';
                        dropdown.appendChild(li);
                        dropdown.style.display = 'block';
                    }
                    return;
                }

                matches.forEach(station => {
                    const li = document.createElement('li');
                    li.className = 'search-dropdown-item';
                    li.innerHTML = station.isNearby ? `${station.name} <span style="opacity:0.6;font-size:0.85em;">${station.desc}</span>` : station.name;
                    li.onmousedown = (e) => {
                        e.preventDefault();
                        TabManager.addTab(station);
                        clearSearch();
                    };
                    dropdown.appendChild(li);
                });

                dropdown.style.display = 'block';
                dropdown.scrollTop = 0;
            };

            const handleAutocomplete = (query, firstMatch) => {
                if (!firstMatch || query.length < 1) return;

                const cityName = firstMatch.name;
                if (cityName.toLowerCase().startsWith(query.toLowerCase())) {
                    const userLen = query.length;
                    input.value = cityName;
                    input.setSelectionRange(userLen, cityName.length);
                }
            };

            const clearSearch = () => {
                input.value = '';
                dropdown.style.display = 'none';
                currentMatches = [];
            };

            input.addEventListener('input', (e) => {
                const query = e.target.value;
                const isDelete = e.inputType && e.inputType.includes('delete');

                currentMatches = SearchEngine.getMatches(query, stations);
                if (currentMatches.length === 0 && query.length > 1) {
                    apiPending = true;
                }
                renderDropdown(currentMatches);

                if (!isDelete && currentMatches.length > 0) {
                    const firstMatchName = currentMatches[0].name.toLowerCase();
                    if (firstMatchName.startsWith(query.toLowerCase())) {
                        handleAutocomplete(query, currentMatches[0]);
                    }
                }

                clearTimeout(input.t);
                input.t = setTimeout(async () => {
                    if (query.length > 1) {
                        try {
                            let lat, lon, name;
                            const [omRes, nomRes] = await Promise.all([
                                fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&format=json`).then(r => r.json()).catch(() => ({})),
                                fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=ch&format=json&limit=1`).then(r => r.json()).catch(() => [])
                            ]);

                            if (omRes.results?.[0]) {
                                ({ latitude: lat, longitude: lon, name } = omRes.results[0]);
                            } else if (nomRes?.[0]) {
                                ({ lat, lon, name } = nomRes[0]);
                            }

                            const fetchQuery = input.value.substring(0, input.selectionStart || input.value.length);
                            if (lat && lon && fetchQuery.toLowerCase() === query.toLowerCase()) {
                                const nearby = SearchEngine.getNearest(lat, lon, stations)
                                    .filter(s => !currentMatches.some(m => m.name === s.name))
                                    .map(s => ({ ...s, desc: `(near ${name}, ${s.dist.toFixed(1)}km)` }));

                                if (nearby.length && document.activeElement === input) {
                                    renderDropdown(currentMatches = [...currentMatches, ...nearby]);
                                }
                            }
                        } catch (e) { toast('Unable to connect. Please check your internet.'); }
                        apiPending = false;
                        if (input.value.trim().length > 0) renderDropdown(currentMatches);
                    }
                }, 300);
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const finalValue = input.value.toLowerCase();
                    const selectedStation = stations.find(s => s.name.toLowerCase() === finalValue);

                    if (selectedStation) {
                        TabManager.addTab(selectedStation);
                        clearSearch();
                    } else if (currentMatches.length > 0) {
                        TabManager.addTab(currentMatches[0]);
                        clearSearch();
                    }
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => { dropdown.style.display = 'none'; }, 200);
            });
        }

        function updateFavoritesOrder() {
            const newFavorites = new Set();
            document.querySelectorAll('.controls .tabs .tab').forEach(tab => {
                const stationName = tab.dataset.station;
                if (stationName && favorites.has(stationName)) {
                    newFavorites.add(stationName);
                }
            });
            favorites = newFavorites;
            localStorage.setItem('favoriteStations', JSON.stringify([...favorites]));
        }

        function setupDragAndDrop() {
            const container = document.querySelector('.controls .tabs');

            container.addEventListener('dragover', e => {
                e.preventDefault();
                const draggable = document.querySelector('.dragging');
                if (!draggable) return;

                const afterElement = getDragAfterElement(container, e.clientX);
                if (afterElement == null) {
                    container.appendChild(draggable);
                } else {
                    container.insertBefore(draggable, afterElement);
                }
            });

            function getDragAfterElement(container, x) {
                const draggableElements = [...container.querySelectorAll('.tab:not(.dragging)')];

                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = x - box.left - box.width / 2;
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }
        }

        function setupTabs(tabGroupSelector) {
            const tabGroup = document.querySelector(tabGroupSelector);
            if (!tabGroup) return;

            const tabs = tabGroup.querySelectorAll('.tab');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const allTabs = tabGroup.querySelectorAll('.tab');
                    allTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    if (tabGroupSelector === '.controls .tabs') {
                        updateActiveTab(tabGroup);
                        if (tab.dataset.station) {
                            localStorage.setItem('lastSelectedStation', tab.dataset.station);
                        }
                    }

                    if (tabGroupSelector === '.navbar .tabs') {
                        const allTabsNav = tabGroup.querySelectorAll('.tab');
                        allTabsNav.forEach(t => {
                            t.textContent = t.textContent.trim().replace(/^Last\s+/, '');
                        });
                        tab.textContent = 'Last ' + tab.textContent.trim();
                        currentTimeframe = tab.textContent.trim();
                        localStorage.setItem('lastSelectedTimeframe', currentTimeframe);
                        updateVisualizations();
                    }

                    console.log('Selected tab:', tab.textContent.trim());
                });
            });
        }

        function setupNavbarActions() {
            const archivesBtn = document.querySelector('.button.outline');
            const aboutBtn = document.querySelector('.button.primary');

            if (archivesBtn) {
                archivesBtn.addEventListener('click', () => {
                    window.location.href = '../';
                });
            }

            if (aboutBtn) {
                aboutBtn.addEventListener('click', () => {
                    window.location.href = '../';
                });
            }
        }

        async function updateVisualizations() {
            if (!currentStation && !localStorage.getItem('lastSelectedStation')) {
                return;
            }

            const stationCode = currentStation?.code || localStorage.getItem('lastSelectedStationCode');

            if (!stationCode) {
                WindDashboard.createEmptyChart(metricEls.windChart.getContext('2d'), currentMetricGroup);
                return;
            }

            const results = await Promise.allSettled([
                WindDashboard.loadData(stationCode, currentTimeframe, currentMetricGroup),
                MeteoSwiss.getCurrentWeather(stationCode)
            ]);

            const chartData = results[0].status === 'fulfilled' ? results[0].value : null;
            const realtimeData = results[1].status === 'fulfilled' ? results[1].value : null;

            if (results[0].status === 'rejected') console.error('Chart data error:', results[0].reason);
            if (results[1].status === 'rejected') console.error('Realtime data error:', results[1].reason);

            const displayName = METRIC_GROUP_DISPLAY_NAMES[currentMetricGroup] || currentMetricGroup;
            metricEls.chartTitle.textContent = displayName + ' Graph';

            if (chartData) {
                WindDashboard.createChart(metricEls.windChart.getContext('2d'), chartData, currentMetricGroup);
                WindDashboard.populateTable(document.querySelector('table'), chartData, currentMetricGroup);
            } else {
                WindDashboard.createEmptyChart(metricEls.windChart.getContext('2d'), currentMetricGroup);
                WindDashboard.populateTable(document.querySelector('table'), { labels: [], datasets: [] }, currentMetricGroup);
            }

            const current = chartData?.current || {};

            const temp = (realtimeData && realtimeData.Temperature !== null) ? realtimeData.Temperature : ((current.temperature !== null) ? current.temperature : null);
            const humidity = (realtimeData && realtimeData.Humidity !== null) ? realtimeData.Humidity : ((current.humidity !== null) ? current.humidity : null);
            const windGust = (realtimeData && realtimeData.Wind_Gusts !== null) ? realtimeData.Wind_Gusts : ((current.windGusts !== null) ? current.windGusts : null);
            const precipitation = (realtimeData && realtimeData.Precipitation !== null) ? realtimeData.Precipitation : ((current.precipitation !== null) ? current.precipitation : null);
            const sunshine = (realtimeData && realtimeData.Sunshine !== null) ? realtimeData.Sunshine : ((current.sunshine !== null) ? current.sunshine : null);
            const globalRadiation = (realtimeData && realtimeData.Global_Radiation !== null) ? realtimeData.Global_Radiation : ((current.globalRadiation !== null) ? current.globalRadiation : null);
            const dewPoint = (realtimeData && realtimeData.Dew_Point !== null) ? realtimeData.Dew_Point : ((current.dewPoint !== null) ? current.dewPoint : null);
            const windDirection = (realtimeData && realtimeData.Wind_Direction !== null) ? realtimeData.Wind_Direction : ((current.windDirection !== null) ? current.windDirection : null);

            const pressure = current.pressure;
            const pressureQff = current.pressureQff;
            const pressureQnh = current.pressureQnh;
            const windAvg = current.windAvg;

            metricEls.currentTemp.textContent = temp != null ? `${temp.toFixed(1)}°C` : '--°C';
            metricEls.trendTemp.textContent = '--°C over last hour';
            metricEls.currentHumidity.textContent = humidity != null ? `${humidity.toFixed(1)}%` : '--%';
            metricEls.currentWindGust.textContent = windGust != null ? `${windGust.toFixed(1)} kph` : '-- kph';
            metricEls.currentPressure.textContent = pressure != null ? `${pressure.toFixed(0)} hPa` : '-- hPa';
            metricEls.currentWindAvg.textContent = windAvg != null ? `${windAvg.toFixed(1)} kph` : '-- kph';
            metricEls.currentWindDirection.textContent = windDirection != null ? `${Math.round(windDirection)}°` : '--°';
            if (windDirection != null) {
                metricEls.windArrow.style.display = 'flex';
                metricEls.windArrow.style.transform = `rotate(${windDirection + 180}deg)`;
            } else {
                metricEls.windArrow.style.display = 'none';
            }
            metricEls.currentPressureQff.textContent = pressureQff != null ? `${pressureQff.toFixed(0)} hPa` : '-- hPa';
            metricEls.currentPressureQnh.textContent = pressureQnh != null ? `${pressureQnh.toFixed(0)} hPa` : '-- hPa';
            metricEls.currentPrecipitation.textContent = precipitation != null ? `${precipitation.toFixed(1)} mm` : '-- mm';
            metricEls.currentSunshine.textContent = sunshine != null ? `${sunshine.toFixed(0)} min` : '-- min';
            metricEls.currentGlobalRadiation.textContent = globalRadiation != null ? `${globalRadiation.toFixed(0)} W/m²` : '-- W/m²';
            metricEls.currentDewPoint.textContent = dewPoint != null ? `${dewPoint.toFixed(1)}°C` : '--°C';

            if (results[0].status === 'rejected' || results[1].status === 'rejected') {
                if (window.toast) window.toast('Some data unavailable. Using cached/fallback values.');
            }
        }

        function createSpotlight() {
            const containers = document.getElementsByClassName("spotlight-container");
            for (const container of containers) {
                container.onmousemove = e => {
                    const items = container.getElementsByClassName("spotlight-item");
                    let maxWidth = 0;
                    const rects = [];

                    for (const item of items) {
                        const rect = item.getBoundingClientRect();
                        maxWidth = Math.max(maxWidth, rect.width);
                        rects.push({ item, rect });
                    }

                    for (const { item, rect } of rects) {
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;

                        item.style.setProperty('--mouse-x', `${x}px`);
                        item.style.setProperty('--mouse-y', `${y}px`);

                        if (item.classList.contains('visualization')) {
                            item.style.setProperty('--spotlight-radius', `${maxWidth * 2}px`);
                            item.style.setProperty('--spotlight-border-radius', `${maxWidth * 1.5}px`);
                        }
                    }
                };
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadStations();

            const savedHiddenMetrics = localStorage.getItem('hiddenMetrics');
            if (savedHiddenMetrics) {
                hiddenMetrics = new Set(JSON.parse(savedHiddenMetrics));
            } else {
                localStorage.setItem('hiddenMetrics', JSON.stringify([...hiddenMetrics]));
            }
            hiddenMetrics.forEach(metricId => {
                const card = document.querySelector(`.metric[data-metric-id="${metricId}"]`);
                if (card) card.classList.add('hidden-metric');
            });
            updateEmptyState();
            setupMetricContextMenus();

            const savedFavorites = localStorage.getItem('favoriteStations');
            if (savedFavorites) {
                favorites = new Set(JSON.parse(savedFavorites));
            }

            const lastSelectedName = localStorage.getItem('lastSelectedStation');

            let finalStationToLoad = null;

            if (favorites.size > 0 && stations.length > 0) {
                favorites.forEach(stationName => {
                    const station = stations.find(s => s.name === stationName);
                    if (station) {
                        const existingTab = document.querySelector(`.controls .tabs .tab[data-station="${station.name}"]`);
                        if (!existingTab) {
                            const newTab = TabManager.createTabElement(station);
                            document.querySelector('.controls .tabs').appendChild(newTab);
                        }
                        finalStationToLoad = station;
                    }
                });
            }

            if (lastSelectedName && stations.length > 0) {
                const station = stations.find(s => s.name === lastSelectedName);
                if (station) {
                    finalStationToLoad = station;
                }
            }

            if (finalStationToLoad) {
                TabManager.addTab(finalStationToLoad);
            }

            restoreActiveMetricCard();

            setupTabs('.navbar .tabs');

            const navbarTabs = document.querySelector('.navbar .tabs');
            const savedTimeframe = localStorage.getItem('lastSelectedTimeframe') || 'Last Day';
            const baseTimeframe = savedTimeframe.replace(/^Last\s+/, '');
            navbarTabs.querySelectorAll('.tab').forEach(tab => {
                const tabBase = tab.textContent.trim();
                if (tabBase === baseTimeframe) {
                    tab.classList.add('active');
                    tab.textContent = 'Last ' + tabBase;
                } else {
                    tab.classList.remove('active');
                }
            });

            setupTabs('.controls .tabs');
            updateActiveTab(document.querySelector('.controls .tabs'));

            setupDragAndDrop();
            setupSearch();
            setupNavbarActions();
            createSpotlight();

            WindDashboard.createEmptyChart(document.getElementById('windChart').getContext('2d'), currentMetricGroup);

            if (currentStation) {
                updateVisualizations();
            }

            MetricCardDragManager.init();
            MetricCardDragManager.restoreOrder();
        });

        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
